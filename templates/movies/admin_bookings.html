<!DOCTYPE html>
<html>
<head>
    <title>Bookings</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #111827;
            color: white;
        }

    </style>
</head>

<body>

<h1>All Bookings</h1>

<table>
    <tr>
        <th>User</th>
        <th>Movie</th>
        <th>Theater</th>
        <th>Seat</th>
        <th>Amount</th>
        <th>Date</th>
    </tr>

    {% for b in bookings %}
    <tr>
        <td>{{ b.user.username }}</td>
        <td>{{ b.movie.name }}</td>
        <td>{{ b.theater.name }}</td>
        <td>{{ b.seat.seat_number }}</td>
        <td>₹{{ b.total_amount }}</td>
        <td>{{ b.booked_at }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
